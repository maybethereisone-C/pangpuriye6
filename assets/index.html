<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="brand" href="#">HOME UX/UI</a>
      <p>Move your cursor across each corner to reveal activity photos</p>
    </header>

    <section class="corner-gallery" aria-label="Interactive activity gallery">
      <div class="center-title">
        <p>Activity Gallery</p>
        <h1>
          <span>Home</span>
          <span>Gallery</span>
        </h1>
      </div>

      <section class="corner-zone top-left active-zone" aria-label="Home activity photos">
        <div class="zone-copy">
          <span>01</span>
          <h2>Home Activities</h2>
        </div>
        <div class="preview-cloud" aria-label="Home activity photos">
          <button
            class="preview-photo photo-a"
            data-title="Game Night"
            data-type="Home Activities"
            data-date="April 12, 2026"
            data-description="A casual game night where everyone relaxed, had fun, and got to know each other better."
            data-image="https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?auto=format&fit=crop&w=700&q=80" alt="Game night activity" />
            <span>Game Night</span>
          </button>
          <button
            class="preview-photo photo-b"
            data-title="Creative Workshop"
            data-type="Home Activities"
            data-date="May 4, 2026"
            data-description="A small creative workshop where members explored ideas, experimented, and built together."
            data-image="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=700&q=80" alt="Creative workshop" />
            <span>Workshop</span>
          </button>
          <button
            class="preview-photo photo-c"
            data-title="House Moment"
            data-type="Home Activities"
            data-date="May 1, 2026"
            data-description="A warm everyday moment with members relaxing, talking, and spending time together."
            data-image="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=700&q=80" alt="Friends activity" />
            <span>House</span>
          </button>
        </div>
      </section>

      <section class="corner-zone top-right active-zone" aria-label="HACK competition photos">
        <div class="zone-copy">
          <span>02</span>
          <h2>HACK Competition</h2>
        </div>
        <div class="preview-cloud" aria-label="HACK competition photos">
          <button
            class="preview-photo photo-a"
            data-title="Hack Day"
            data-type="HACK Competition"
            data-date="April 25, 2026"
            data-description="A high-energy sprint of brainstorming, prototyping, and presenting ideas under time pressure."
            data-image="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=700&q=80" alt="Hack competition teamwork" />
            <span>Hack Day</span>
          </button>
          <button
            class="preview-photo photo-b"
            data-title="Pitch Moment"
            data-type="HACK Competition"
            data-date="April 26, 2026"
            data-description="The team pitch moment, sharing the concept, the problem, and the proposed solution."
            data-image="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=700&q=80" alt="Pitch presentation" />
            <span>Pitch</span>
          </button>
          <button
            class="preview-photo photo-c"
            data-title="Build Sprint"
            data-type="HACK Competition"
            data-date="April 25, 2026"
            data-description="Team members refining flows, solving problems, and preparing the prototype before submission."
            data-image="https://images.unsplash.com/photo-1531482615713-2afd69097998?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?auto=format&fit=crop&w=700&q=80" alt="Team building sprint" />
            <span>Sprint</span>
          </button>
        </div>
      </section>

      <section class="corner-zone bottom-left active-zone" aria-label="Workshop activity photos">
        <div class="zone-copy">
          <span>03</span>
          <h2>Workshop Moments</h2>
        </div>
        <div class="preview-cloud" aria-label="Workshop activity photos">
          <button
            class="preview-photo photo-a"
            data-title="Design Jam"
            data-type="Workshop Moments"
            data-date="May 8, 2026"
            data-description="A hands-on design session where members sketched ideas, tested layouts, and shared feedback."
            data-image="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=700&q=80" alt="Design workshop discussion" />
            <span>Design Jam</span>
          </button>
          <button
            class="preview-photo photo-b"
            data-title="Idea Board"
            data-type="Workshop Moments"
            data-date="May 8, 2026"
            data-description="Members organized ideas, mapped user journeys, and turned rough thoughts into clearer directions."
            data-image="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=700&q=80" alt="Team working with sticky notes" />
            <span>Idea Board</span>
          </button>
          <button
            class="preview-photo photo-c"
            data-title="Review Circle"
            data-type="Workshop Moments"
            data-date="May 9, 2026"
            data-description="A group review moment focused on improving visual hierarchy, flow, and interaction details."
            data-image="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=700&q=80" alt="Group review meeting" />
            <span>Review</span>
          </button>
        </div>
      </section>

      <section class="corner-zone bottom-right active-zone" aria-label="Showcase activity photos">
        <div class="zone-copy">
          <span>04</span>
          <h2>Showcase Day</h2>
        </div>
        <div class="preview-cloud" aria-label="Showcase activity photos">
          <button
            class="preview-photo photo-a"
            data-title="Final Demo"
            data-type="Showcase Day"
            data-date="May 10, 2026"
            data-description="A presentation moment where teams showed their final concepts and explained the design decisions."
            data-image="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=700&q=80" alt="Final demo presentation" />
            <span>Final Demo</span>
          </button>
          <button
            class="preview-photo photo-b"
            data-title="Project Booth"
            data-type="Showcase Day"
            data-date="May 10, 2026"
            data-description="A booth-style showcase where visitors explored prototypes and asked questions about each project."
            data-image="https://images.unsplash.com/photo-1515169067865-5387ec356754?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1515169067865-5387ec356754?auto=format&fit=crop&w=700&q=80" alt="Project showcase booth" />
            <span>Booth</span>
          </button>
          <button
            class="preview-photo photo-c"
            data-title="Team Photo"
            data-type="Showcase Day"
            data-date="May 10, 2026"
            data-description="A closing team photo that captures the energy, teamwork, and shared achievement of the day."
            data-image="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1200&q=80"
          >
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=700&q=80" alt="Team group photo" />
            <span>Team Photo</span>
          </button>
        </div>
      </section>
    </section>
  </main>

  <dialog class="modal" id="galleryModal">
    <button class="close" aria-label="Close dialog">×</button>
    <div class="modal-media">
      <img id="modalImage" src="" alt="" />
    </div>
    <div class="modal-content">
      <p id="modalType"></p>
      <h2 id="modalTitle"></h2>
      <span id="modalDate"></span>
      <p id="modalDescription"></p>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
