apiVersion: v1
kind: Service
metadata:
  name: pangpuriye6
  namespace: develop
  labels:
    app: pangpuriye6
    env: develop
spec:
  type: NodePort
  selector:
    app: pangpuriye6
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
# ============================================================
# Ingress — routes external traffic to the Service
# Requires nginx ingress controller installed in the cluster
# ============================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pangpuriye6
  namespace: develop
spec:
  ingressClassName: nginx
  rules:
    - host: www.pangpuriye.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pangpuriye6
                port:
                  number: 80