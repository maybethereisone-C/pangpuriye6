apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangpuriye6
  namespace: develop
  labels:
    app: pangpuriye6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pangpuriye6
  template:
    metadata:
      labels:
        app: pangpuriye6
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      containers:
        - name: pangpuriye6
          image: gridwhizth/pangpuriye6:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user in nginx:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: pangpuriye6
  namespace: develop
  labels:
    app: pangpuriye6
spec:
  selector:
    app: pangpuriye6
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pangpuriye6
  namespace: develop
spec:
  ingressClassName: nginx
  rules:
    - host: www.pangpuriye.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pangpuriye6
                port:
                  number: 80
