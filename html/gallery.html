<section class="gallery-section" id="gallery" data-section-index="5">

  <!-- section header -->
  <p class="gallery-section__label">SEC.05 · Gallery // Moments</p>
  <h2 class="gallery-section__title">The<br/>Archive.</h2>
  <p class="gallery-section__sub" id="gallery-status">// loading archive…</p>

  <!-- category filter -->
  <div class="gallery-cats" id="gallery-cats" role="tablist" aria-label="Filter by category">
    <!-- injected by gallery.js -->
  </div>

  <!-- focus carousel -->
  <div class="gallery-stage">

    <button class="gallery-arrow gallery-arrow--prev" id="gallery-prev" aria-label="Previous item">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="gallery-viewport">
      <div class="gallery-track" id="gallery-track">
        <!-- cards injected by gallery.js -->
      </div>
    </div>

    <button class="gallery-arrow gallery-arrow--next" id="gallery-next" aria-label="Next item">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <!-- dots -->
  <div class="gallery-dots" id="gallery-dots" role="tablist" aria-label="Gallery navigation"></div>

</section>
