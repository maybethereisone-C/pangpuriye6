worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── gzip compression ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── hide nginx version ─────────────────────────────────────────────────
    server_tokens off;

    server {
        listen      80;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── cache: static assets (CSS / JS / SVG / fonts) ──────────────────
        location ~* \.(css|js|svg|woff2?|ttf|eot)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── cache: images ──────────────────────────────────────────────────
        location ~* \.(png|jpg|jpeg|webp|gif|ico)$ {
            expires    30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── HTML fragments — short cache so updates propagate quickly ───────
        location ~* \.html$ {
            expires    5m;
            add_header Cache-Control "public, must-revalidate";
        }

        # ── API proxy → backend service (resolvable inside k8s cluster) ──────
        location /api/ {
            proxy_pass         http://pangpuriye:1323/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── SPA fallback (all unknown paths → index.html) ───────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── deny hidden files (.git, .DS_Store, etc.) ──────────────────────
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
